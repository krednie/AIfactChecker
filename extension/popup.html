<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alithia — Fact Checker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ── IDLE VIEW ─────────────────────────────── -->
  <div id="view-idle" class="view active">

    <!-- GLASS CONTAINER: header navigation layer -->
    <header class="glass-header">
      <div class="header-brand">
        <!-- Logo in glass circle — glassEffectIOS26(in: Circle()) -->
        <div class="brand-orb">
          <img src="icons/logo.png" alt="Alithia" onerror="this.style.display='none';this.parentNode.querySelector('.brand-orb-text').style.display='flex'" />
          <span class="brand-orb-text" style="display:none">A</span>
        </div>
        <div class="brand-text">
          <span class="brand-name">Alithia</span>
          <span class="brand-sub">AI Fact Verification</span>
        </div>
      </div>
      <div class="header-right">
        <!-- GLASS CONTAINER: grouped navigation controls -->
        <div class="live-chip">
          <span class="live-dot"></span>
          LIVE
        </div>
        <!-- Interactive glass button — glassEffectInteractiveIOS26(in: Circle()) -->
        <button id="btn-overlay-toggle" class="toggle-btn" title="Toggle inline overlay">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        </button>
      </div>
    </header>

    <!-- Input section -->
    <div class="input-section">

      <!-- GLASS CONTAINER: tab group — GlassEffectContainerIOS26 -->
      <div class="tab-row" role="tablist">
        <!-- Tab buttons — glassEffectInteractiveIOS26 per slot -->
        <button class="tab-btn active" id="tab-text" role="tab" aria-selected="true">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="13" y1="18" x2="3" y2="18"/></svg>
          Text
        </button>
        <button class="tab-btn" id="tab-img" role="tab" aria-selected="false">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Screenshot
        </button>
      </div>

      <!-- Text panel — content area, NOT glass -->
      <div id="panel-text" class="input-panel">
        <textarea id="text-input" class="glass-textarea" rows="4" placeholder="Paste a claim, headline or social post…"></textarea>
      </div>

      <!-- Image panel -->
      <div id="panel-img" class="input-panel hidden">
        <div id="img-zone" class="img-zone" tabindex="0" role="button" aria-label="Upload or paste screenshot">
          <div id="img-idle">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.35"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <p class="img-zone-label">Drop or click to upload</p>
            <p class="img-zone-hint">Ctrl+V also works</p>
          </div>
          <img id="img-preview" class="img-preview hidden" alt="Preview" />
        </div>
        <div class="img-actions">
          <!-- Glass buttons — glassEffectInteractiveIOS26 -->
          <button id="btn-paste-clip" class="ghost-btn">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
            Paste Clipboard
          </button>
          <button id="btn-clear-img" class="ghost-btn hidden">✕ Clear</button>
        </div>
        <input type="file" id="file-input" accept="image/*" style="display:none" aria-hidden="true" />
      </div>
    </div>

    <!-- Action row -->
    <div class="action-row">
      <div id="grab-btns" class="grab-btns">
        <!-- Glass ghost buttons -->
        <button id="btn-page" class="ghost-btn" title="Grab page text">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Page
        </button>
        <button id="btn-sel" class="ghost-btn" title="Use selected text">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Selection
        </button>
      </div>
      <!-- Primary CTA — red interactive glass button -->
      <button id="btn-analyze" class="analyze-btn" disabled>
        Analyze
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>

    <!-- Trending feed -->
    <div id="trending-container" class="trending-container hidden">
      <div class="trending-header">
        <div class="trending-title">
          <span class="trending-pulse"></span>
          Trending Claims
        </div>
        <span id="trending-time" class="trending-time"></span>
      </div>
      <div id="trending-feed" class="trending-feed"></div>
    </div>

  </div>

  <!-- ── LOADING VIEW ───────────────────────────── -->
  <div id="view-loading" class="view">
    <!-- Navigation glass header -->
    <header class="glass-header">
      <div class="header-brand">
        <div class="brand-orb">
          <img src="icons/logo.png" alt="Alithia" onerror="this.style.display='none';this.parentNode.querySelector('.brand-orb-text').style.display='flex'" />
          <span class="brand-orb-text" style="display:none">A</span>
        </div>
        <div class="brand-text">
          <span class="brand-name">Alithia</span>
        </div>
      </div>
    </header>
    <div class="loading-center">
      <!-- Glass spinner — GlassEffectContainerIOS26 with morphing rings -->
      <div class="glass-spinner">
        <div class="spinner-ring"></div>
        <div class="spinner-ring ring2"></div>
        <!-- Morphing logo center — glassEffectIDIOS26 equivalent -->
        <div class="spinner-logo">
          <img src="icons/logo.png" alt="A" onerror="this.parentNode.innerHTML='<span class=\'spinner-a\'>A</span>'" />
        </div>
      </div>
      <p id="loading-label" class="loading-label">Scanning claims…</p>
      <div class="loading-steps">
        <span class="step-dot active"></span>
        <span class="step-dot"></span>
        <span class="step-dot"></span>
        <span class="step-dot"></span>
      </div>
      <button id="btn-stop-search" class="ghost-btn" style="margin-top: 16px;">✕ Stop</button>
    </div>
  </div>

  <!-- ── RESULTS VIEW ───────────────────────────── -->
  <div id="view-results" class="view">
    <header class="glass-header compact">
      <div class="header-brand">
        <!-- Small glass orb logo -->
        <div class="brand-orb small">
          <img src="icons/logo.png" alt="Alithia" onerror="this.style.display='none';this.parentNode.querySelector('.brand-orb-text').style.display='flex'" />
          <span class="brand-orb-text" style="display:none;font-size:12px">A</span>
        </div>
        <span class="brand-name compact">Alithia</span>
      </div>
      <div class="results-header-row">
        <span id="results-meta" class="results-meta"></span>
        <!-- Glass capsule back button — glassEffectInteractiveIOS26(in: Capsule()) -->
        <button id="btn-back" class="back-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          New
        </button>
      </div>
    </header>

    <!-- Score -->
    <div id="sidebar-score" class="score-bar hidden">
      <div class="score-bar-inner">
        <span class="score-label">Accuracy</span>
        <div class="score-track">
          <div id="score-fill" class="score-fill"></div>
        </div>
        <span id="score-num" class="score-num">—</span>
      </div>
    </div>

    <!-- Pills nav -->
    <div id="claims-nav" class="claims-nav"></div>

    <!-- Verdict cards -->
    <div id="claims-container" class="claims-container"></div>
  </div>

  <!-- ── ERROR VIEW ─────────────────────────────── -->
  <div id="view-error" class="view">
    <header class="glass-header">
      <div class="header-brand">
        <div class="brand-orb">
          <img src="icons/logo.png" alt="Alithia" onerror="this.style.display='none';this.parentNode.querySelector('.brand-orb-text').style.display='flex'" />
          <span class="brand-orb-text" style="display:none">A</span>
        </div>
        <span class="brand-name">Alithia</span>
      </div>
    </header>
    <div class="error-center">
      <!-- Glass error icon — glassEffectIOS26(in: Circle()) -->
      <div class="error-icon-wrap">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <p id="error-msg" class="error-msg">Something went wrong.</p>
      <!-- Interactive glass retry button -->
      <button id="btn-retry" class="analyze-btn">Try Again</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
