services:
  - type: web
    name: alithia-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: SARVAM_API_KEY
        sync: false
      - key: GOOGLE_FACT_CHECK_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama3-70b-8192
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: FAISS_INDEX_PATH
        value: data/faiss.index
      - key: CHUNK_META_PATH
        value: data/chunk_meta.pkl
      - key: CORPUS_JSONL_PATH
        value: data/scraped_corpus.jsonl
      - key: TOP_K
        value: "8"
      - key: BACKEND_PORT
        value: "8000"
      # Memory savers — keep false on free tier (2 GB limit)
      - key: PRELOAD_OCR
        value: "false"
      - key: PRELOAD_TRENDING
        value: "false"
